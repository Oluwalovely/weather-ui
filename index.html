<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- App meta -->
    <title>weatherbylovely</title>
    <meta name="description" content="Beautiful real-time weather forecasts by Lovely" />
    <meta name="theme-color" content="#080600" />

    <!-- Open Graph (looks good when shared on WhatsApp, Twitter etc.) -->
    <meta property="og:title" content="weatherbylovely" />
    <meta property="og:description" content="Real-time weather & 5-day forecasts" />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="weatherbylovely" />
    <meta name="twitter:image" content="/logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
